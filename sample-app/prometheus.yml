global:
  scrape_interval: 5s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
      - targets:
        - "alertmanager:9093"


scrape_configs:
  - job_name: "node_exporter"
    static_configs:
      - targets: ["172.31.34.181:9100"]

  - job_name: "flask_app"
    static_configs:
      - targets: ["172.31.34.181:5000"]
